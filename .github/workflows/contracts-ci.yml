name: Contracts CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Test contracts
        run: npm run contracts:test
